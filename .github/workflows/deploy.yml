name: Deploy a Vercel

# Modelo: el repo vive en lajoya777 (nuestro). Vercel vive en la cuenta del cliente.
# El workflow despliega via CLI con un token de servicio (VERCEL_TOKEN) — Vercel nunca
# tiene acceso al código fuente, solo recibe los artefactos de build.
# Patrón oficial: https://vercel.com/guides/how-can-i-use-github-actions-with-vercel

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened]

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  preview:
    name: Deploy preview (PRs)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel preview env
        run: vercel pull --yes --environment=preview --token="$VERCEL_TOKEN"

      - name: Build
        run: vercel build --token="$VERCEL_TOKEN"

      - name: Deploy preview
        id: deploy
        run: |
          URL=$(vercel deploy --prebuilt --token="$VERCEL_TOKEN")
          echo "url=$URL" >> "$GITHUB_OUTPUT"
          echo "Preview: $URL"

      - name: Comentar URL en el PR
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          message: |
            🚀 **Preview deploy listo:** ${{ steps.deploy.outputs.url }}

  production:
    name: Deploy production (push a main)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel production env
        run: vercel pull --yes --environment=production --token="$VERCEL_TOKEN"

      - name: Build
        run: vercel build --prod --token="$VERCEL_TOKEN"

      - name: Deploy production
        run: vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN"
